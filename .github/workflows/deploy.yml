name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch: # 也可在 Actions 頁手動觸發

# GitHub Pages 部署所需權限
permissions:
  contents: read
  pages: write
  id-token: write

# 同時間只跑一個部署，新的取代排隊中的（但不取消進行中的）
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # workspaces monorepo：root 一個 lockfile，npm ci 裝全部後只 build 前端
      - run: npm ci
      - run: npm run build -w client
        env:
          # 在 repo Settings → Secrets and variables → Actions 新增 VITE_GA_ID（GA4 評估 ID）
          VITE_GA_ID: ${{ secrets.VITE_GA_ID }}

      # GitHub Pages 對未知路徑不會 fallback，複製一份 404.html 讓任何路徑重整都回到 app
      - run: cp client/dist/index.html client/dist/404.html

      # 寫入 CNAME 綁定 custom domain，避免每次 build 後 Pages 設定被產物覆蓋掉
      - run: echo 'cat-shot.sheepht.com' > client/dist/CNAME

      # enablement: true 讓此 action 自動透過 API 開啟 Pages，免去手動到 Settings 設定
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
